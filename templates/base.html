<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}SentimentStream{% endblock %}</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📊</text></svg>">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <a href="/" class="nav-brand">
                <span class="brand-icon">&#x1F4CA;</span>
                SentimentStream
            </a>
            <div class="nav-links">
                <a href="/" class="nav-link {% if request.url.path == '/' %}active{% endif %}">Dashboard</a>
                <a href="/topics" class="nav-link {% if request.url.path == '/topics' %}active{% endif %}">Topics</a>
                <a href="/trends" class="nav-link {% if request.url.path == '/trends' %}active{% endif %}">Trends</a>
                <a href="/analyze" class="nav-link {% if request.url.path == '/analyze' %}active{% endif %}">Analyze</a>
                <a href="/about" class="nav-link {% if request.url.path == '/about' %}active{% endif %}">About</a>
            </div>
        </div>
    </nav>

    <main class="main-content">
        {% block content %}{% endblock %}
    </main>

    <footer class="footer">
        <div class="footer-container">
            <p>&copy; 2024 SentimentStream &mdash; Real-time social media sentiment analysis</p>
            <p class="footer-links">
                <a href="/api/health">API Health</a>
                <span class="sep">|</span>
                <a href="/about">About</a>
            </p>
        </div>
    </footer>

    <script src="/static/js/main.js"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
